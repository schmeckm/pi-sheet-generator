services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pisheet
      POSTGRES_USER: pisheet
      POSTGRES_PASSWORD: pisheet_dev
    ports:
      - "7003:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pisheet -d pisheet"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  sap-mcp:
    build:
      context: ../sap-mcp-server
      dockerfile: Dockerfile
    ports:
      - "7001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    ports:
      - "7000:7000"
    environment:
      NODE_ENV: production
      PORT: 7000
      DATABASE_URL: postgres://pisheet:pisheet_dev@db:5432/pisheet
      JWT_SECRET: ${JWT_SECRET:-change-me-docker-secret-min-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CORS_ORIGINS: http://localhost:7002,http://127.0.0.1:7002,http://localhost:7004,http://127.0.0.1:7004
      SAP_MCP_ENABLED: ${SAP_MCP_ENABLED:-false}
      SAP_MCP_URL: ${SAP_MCP_URL:-http://sap-mcp:3001/sse}
      SAP_MCP_AUTH_TOKEN: ${SAP_MCP_AUTH_TOKEN:-}
      AUTO_SEED: ${AUTO_SEED:-true}
    depends_on:
      db:
        condition: service_healthy
      sap-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 120s
      retries: 5
    restart: unless-stopped

  client:
    profiles: ["full"]
    build:
      context: .
      dockerfile: docker/client/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "7004:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
