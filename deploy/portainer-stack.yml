# Portainer Stack — PI Sheet Generator (images from Docker Hub)
# Paste into Portainer → Stacks → Add stack → Web editor
# Env: see deploy/.env.portainer.example (POSTGRES_PASSWORD, JWT_SECRET, ANTHROPIC_API_KEY required)

services:
  db:
    image: pgvector/pgvector:pg16
    shm_size: 256mb
    environment:
      POSTGRES_DB: pisheet
      POSTGRES_USER: pisheet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pisheet -d pisheet']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - pisheet

  api:
    image: ${DOCKERHUB_USER:-schmeckm}/pi-sheet-generator-api:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 7000
      DATABASE_URL: postgres://pisheet:${POSTGRES_PASSWORD}@db:5432/pisheet
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:7004}
      SAP_MCP_ENABLED: ${SAP_MCP_ENABLED:-false}
      SAP_MCP_URL: ${SAP_MCP_URL:-}
      SAP_MCP_AUTH_TOKEN: ${SAP_MCP_AUTH_TOKEN:-}
      AUTO_SEED: ${AUTO_SEED:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:7000/api/health']
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 10
    restart: unless-stopped
    networks:
      - pisheet

  client:
    image: ${DOCKERHUB_USER:-schmeckm}/pi-sheet-generator-client:${IMAGE_TAG:-latest}
    ports:
      - '${CLIENT_PORT:-7004}:80'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - pisheet

volumes:
  pgdata:

networks:
  pisheet:
    driver: bridge
