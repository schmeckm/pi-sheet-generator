# Build API + client images and push to Docker Hub on every push to main.
# Required GitHub secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Publish Docker images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE_API: ${{ secrets.DOCKERHUB_USERNAME }}/pi-sheet-generator-api
  IMAGE_CLIENT: ${{ secrets.DOCKERHUB_USERNAME }}/pi-sheet-generator-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Set repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (Docker Hub → Account Settings → Security → Access Token)"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (API)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (Client)
        id: meta_client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CLIENT }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/client/Dockerfile
          push: true
          tags: ${{ steps.meta_client.outputs.tags }}
          labels: ${{ steps.meta_client.outputs.labels }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Images published" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_API }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_CLIENT }}:latest\`" >> $GITHUB_STEP_SUMMARY
