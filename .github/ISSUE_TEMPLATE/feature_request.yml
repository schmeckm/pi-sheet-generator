name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What manufacturing or UX problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat / LLM
        - PI Sheet / GMP
        - Admin
        - Equipment / MCP
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: gmp
    attributes:
      label: GMP impact
      options:
        - label: May affect audit trail, approval workflow, or regulated wording
