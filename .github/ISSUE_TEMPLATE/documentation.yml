name: Documentation
description: Improve README, docs, or in-app help
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Which document or screen?
      placeholder: README, docs/DOCUMENTATION.md, Admin Help, ...
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: What should be clarified or added?
    validations:
      required: true
